# Vorgangswerk – docker compose up

services:

  # ---------------------------------------------------------------------------
  # Datenbank
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16@sha256:78df81b1442dcc764c1104154da7162635e40cfffe67579c42a1c1b96dfc209c
    restart: unless-stopped
    environment:
      POSTGRES_DB: vorgangswerk
      POSTGRES_USER: vorgangswerk
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vorgangswerk}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vorgangswerk"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Web-App
  # ---------------------------------------------------------------------------
  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-key-bitte-aendern}
      DEBUG: ${DEBUG:-False}
      DB_HOST: db
      DB_NAME: vorgangswerk
      DB_USER: vorgangswerk
      DB_PASSWORD: ${DB_PASSWORD:-vorgangswerk}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      ONLYOFFICE_URL: ${ONLYOFFICE_URL:-https://office.georg-klein.com}
      ONLYOFFICE_INTERNAL_URL: ${ONLYOFFICE_INTERNAL_URL:-http://host.docker.internal:8012}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-vorgangswerk-oo-secret}
      VORGANGSWERK_BASE_URL: ${VORGANGSWERK_BASE_URL:-http://localhost:8100}
      WOPI_BASE_URL: ${WOPI_BASE_URL:-http://host.docker.internal:8100}
      VERSCHLUESSEL_KEY: ${VERSCHLUESSEL_KEY:-}
      SIGNME_API_KEY: ${SIGNME_API_KEY:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BUNDID_SP_ENTITY_ID: ${BUNDID_SP_ENTITY_ID:-vorgangswerk}
      BUNDID_IDP_SSO_URL: ${BUNDID_IDP_SSO_URL:-http://localhost:8089/saml}
    ports:
      - "8100:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - sicherungen:/app/sicherungen

  # ---------------------------------------------------------------------------
  # E-Mail-Worker (IMAP-Polling)
  # ---------------------------------------------------------------------------
  worker:
    build: .
    restart: unless-stopped
    command: python manage.py email_worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-key-bitte-aendern}
      DEBUG: ${DEBUG:-False}
      DB_HOST: db
      DB_NAME: vorgangswerk
      DB_USER: vorgangswerk
      DB_PASSWORD: ${DB_PASSWORD:-vorgangswerk}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}

  # ---------------------------------------------------------------------------
  # OnlyOffice Document Server
  # Hinweis: Wird auf diesem Server vom PRIMA-Compose geteilt (Port 8012).
  # Eigener Container nur bei Bedarf: docker compose --profile onlyoffice up
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # BundID-Simulator (Testumgebung für SAML-SP-Integration)
  # UI: http://localhost:8089  – Nutzer U01-U07 auswählen
  # SAML-Endpoint: http://bundid-sim:8080/saml  (intern im Docker-Netz)
  # Aktivieren: docker compose --profile bundid up
  # ---------------------------------------------------------------------------
  bundid-sim:
    image: ghcr.io/ba-itsys/bundid-simulator:v1.0.8
    restart: unless-stopped
    profiles:
      - bundid
    ports:
      - "8089:8080"

  onlyoffice:
    image: onlyoffice/documentserver:8.3
    restart: unless-stopped
    profiles:
      - onlyoffice
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-vorgangswerk-oo-secret}
      JWT_HEADER: Authorization
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    ports:
      - "${ONLYOFFICE_PORT:-8016}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Sicherungs-Worker (täglich 02:00 Uhr, wöchentlich Sonntag, monatlich 1.)
  # ---------------------------------------------------------------------------
  backup:
    build: .
    restart: unless-stopped
    command: python manage.py backup_worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-key-bitte-aendern}
      DEBUG: ${DEBUG:-False}
      DB_HOST: db
      DB_NAME: vorgangswerk
      DB_USER: vorgangswerk
      DB_PASSWORD: ${DB_PASSWORD:-vorgangswerk}
      VERSCHLUESSEL_KEY: ${VERSCHLUESSEL_KEY:-}
      SICHERUNGS_DIR: /app/sicherungen
    volumes:
      - sicherungen:/app/sicherungen


volumes:
  pgdata:
  staticfiles:
  sicherungen:
  onlyoffice_data:
  onlyoffice_logs:
