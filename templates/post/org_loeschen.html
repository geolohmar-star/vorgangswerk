{% extends "base.html" %}
{% block title %}Organisation löschen – Vorgangswerk{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:480px">
  <div class="card border-danger">
    <div class="card-header text-danger"><strong>Organisation löschen</strong></div>
    <div class="card-body">
      <p>Soll <strong>{{ org.name }}</strong> wirklich gelöscht werden?</p>
      <form method="post" class="d-flex gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Ja, löschen</button>
        <a href="{% url 'post:org_liste' %}" class="btn btn-outline-secondary">Abbrechen</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
