{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Antrag{% endblock %}</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .prima-header {
            background: #1a4d2e;
            color: white;
            padding: 10px 0;
            margin-bottom: 2rem;
        }
        .prima-header .brand { font-weight: 700; font-size: 1.1rem; }
        .prima-footer {
            color: #adb5bd;
            font-size: 0.8rem;
            margin-top: 3rem;
            padding: 1rem 0;
            border-top: 1px solid #dee2e6;
            text-align: center;
        }
    </style>
    {% block extra_css %}{% endblock %}
    {% if embed %}<style>body { background: #fff; } .prima-header, .prima-footer { display: none !important; }</style>{% endif %}
</head>
<body>
    <div class="prima-header">
        <div class="container" style="max-width:700px;">
            <span class="brand">Antragsformular – Vorgangswerk</span>
        </div>
    </div>

    {% block content %}{% endblock %}

    <div class="prima-footer">
        <div class="container" style="max-width:700px;">
            Ihre Daten werden sicher übertragen und verarbeitet.
        </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
