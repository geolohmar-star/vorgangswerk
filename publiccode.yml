description:
  de:
    genericName: Vorgangsbearbeitung
    shortDescription: >
      OZG-konforme Plattform für digitale Verwaltungsvorgänge – Formulare,
      Workflows, DMS und Signaturen in einer Anwendung.
    longDescription: >
      Vorgangswerk ist eine quelloffene Plattform zur digitalen Bearbeitung von
      Verwaltungsvorgängen. Sie ermöglicht Behörden und Organisationen,
      Antragsformulare, Workflows, Dokumente und Kommunikation in einer
      einheitlichen, selbst gehosteten Anwendung zu verwalten.

      Der visuelle Pfad-Editor erlaubt die Erstellung mehrstufiger
      Antragsstrecken mit über 20 Feldtypen, bedingten Feldern (zeige_wenn),
      Verzweigungen und automatischer PDF-Ausgabe. Öffentliche Antragsstrecken
      können ohne Login genutzt werden; Antragsteller erhalten einen
      Tracking-Link für den Bearbeitungsstatus.

      Das integrierte Workflow-System ermöglicht die Modellierung von
      Geschäftsprozessen mit Aufgabenzuweisung, Arbeitsstapel-Übersicht und
      Prozesszentrale. Das Dokumentenmanagementsystem (DMS) unterstützt
      Versionierung, Klassifizierung (öffentlich/intern/sensibel) und direkte
      Dokumentenbearbeitung via OnlyOffice (WOPI).

      Digitale Signaturen sind sowohl als Fortgeschrittene Elektronische
      Signatur (FES) intern via pyHanko als auch als Qualifizierte Elektronische
      Signatur (QES) via sign.me (Bundesdruckerei) möglich.

      Ein optionales KI-Portal ermöglicht den Import beliebiger PDF-Formulare:
      Claude KI analysiert Struktur und Felder und legt automatisch eine
      vollständige Pfad-Definition an.

      Das integrierte Quiz-Modul eignet sich für Schulungen,
      Sicherheitseinweisungen und Prüfungen (z. B. BAMF-Einbürgerungstest) mit
      automatischer Auswertung und Zertifikatsgenerierung.

      BundID-ready: SAML SP-Integration implementiert und mit dem offiziellen
      BundID-Simulator getestet. Anbindung an id.bund.de nach SP-Registrierung
      beim ITZBund ohne Codeänderungen möglich. OZG-konformes Bürgerkonto
      out-of-the-box.
    features:
      - Visueller Pfad-Editor für mehrstufige Antragsstrecken
      - 'Über 20 Feldtypen inkl. Datei-Upload, Unterschrift, IBAN, Adresse'
      - Bedingte Felder (zeige_wenn) und Verzweigungen
      - Öffentliche Antragsstrecken ohne Login mit Tracking
      - Workflow-Engine mit Aufgabenverwaltung und Arbeitsstapel
      - Dokumentenmanagementsystem mit OnlyOffice-Integration
      - 'Digitale Signatur: FES (intern) und QES (sign.me / Bundesdruckerei)'
      - Quiz-Modul für Schulungen und Einbürgerungstest
      - KI-gestützter PDF-Formular-Import (Claude API)
      - IMAP-E-Mail-Integration
      - AES-256-GCM-Verschlüsselung für sensible Dokumente
      - 'MFA (TOTP), Brute-Force-Schutz, REST-API'
      - 'BundID-ready: SAML SP implementiert, OZG-konform'
      - Docker-basiertes Deployment
